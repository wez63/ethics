    const tabsBar = document.getElementById('tabsBar');
    const contentSections = document.getElementById('contentSections');

    // الدالة الرئيسية لتهيئة الصفحة وبناء العناصر
    function buildInterface() {
        completeDatabase.forEach((section, sIdx) => {
            // 1. توليد التبويبات العلوية
            const tabBtn = document.createElement('button');
            tabBtn.type = 'button';
            tabBtn.className = `tab-btn ${sIdx === 0 ? 'active' : ''}`;
            
            // اختصار الأسماء للتبويبات لتبدو أنيقة
            let shortName = section.title.split(':')[0].replace(/\(.*?\)/g, '').trim();
            tabBtn.innerText = shortName;
            tabBtn.onclick = (e) => switchSection(sIdx, e.target);
            tabsBar.appendChild(tabBtn);

            // 2. توليد المحتوى لكل قسم
            const sectionDiv = document.createElement('div');
            sectionDiv.className = `section-content ${sIdx === 0 ? 'active' : ''}`;
            sectionDiv.id = `sec-${sIdx}`;

            let htmlContent = `
                <div class="section-header">
                    <h2 class="section-title">${section.title}</h2>
                    <span class="question-count-badge">${section.questions.length} أسئلة</span>
                </div>
            `;

            section.questions.forEach((qItem, qIdx) => {
                let optionsHtml = '';
                qItem.opts.forEach((optStr, oIdx) => {
                    optionsHtml += `
                        <li>
                            <label class="option-label" id="lbl-${sIdx}-${qIdx}-${oIdx}">
                                <input type="radio" name="q_${sIdx}_${qIdx}" value="${oIdx}">
                                <span>${optStr}</span>
                            </label>
                        </li>
                    `;
                });

                htmlContent += `
                    <div class="question-card">
                        <div class="question-text">${qIdx + 1}. ${qItem.q}</div>
                        <ul class="options-group">
                            ${optionsHtml}
                        </ul>
                    </div>
                `;
            });

            // إضافة زر التسليم ومربع النتيجة لكل تبويب
            htmlContent += `
                <div class="submit-area">
                    <button type="button" class="action-btn" onclick="submitAnswers(${sIdx})">
                        تحقق من الإجابات (${shortName})
                    </button>
                    <div class="score-display" id="res-${sIdx}"></div>
                </div>
            `;

            sectionDiv.innerHTML = htmlContent;
            contentSections.appendChild(sectionDiv);
        });
    }

    // دالة التبديل بين التبويبات
    function switchSection(targetIdx, clickedBtn) {
        // تحديث حالة الأزرار
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx === targetIdx);
        });

        // تحديث المحتوى المعروض
        document.querySelectorAll('.section-content').forEach((sec, idx) => {
            sec.classList.toggle('active', idx === targetIdx);
        });

        // التمرير التلقائي للتبويب ليتوسط الشاشة (مفيد للجوال)
        clickedBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    // دالة تصحيح الإجابات وحساب الدرجة
    function submitAnswers(sIdx) {
        const sectionData = completeDatabase[sIdx];
        let correctAnswersCount = 0;
        let missedQuestions = false;

        sectionData.questions.forEach((qItem, qIdx) => {
            const selectedRadio = document.querySelector(`input[name="q_${sIdx}_${qIdx}"]:checked`);
            
            // إزالة التنسيقات السابقة
            qItem.opts.forEach((_, oIdx) => {
                document.getElementById(`lbl-${sIdx}-${qIdx}-${oIdx}`).classList.remove('correct-answer', 'wrong-answer');
            });

            if (selectedRadio) {
                const answerVal = parseInt(selectedRadio.value);
                if (answerVal === qItem.ans) {
                    correctAnswersCount++;
                    document.getElementById(`lbl-${sIdx}-${qIdx}-${answerVal}`).classList.add('correct-answer');
                } else {
                    document.getElementById(`lbl-${sIdx}-${qIdx}-${answerVal}`).classList.add('wrong-answer');
                    // إبراز الإجابة الصحيحة
                    document.getElementById(`lbl-${sIdx}-${qIdx}-${qItem.ans}`).classList.add('correct-answer');
                }
            } else {
                missedQuestions = true;
                // إبراز الإجابة الصحيحة للمستخدم حتى لو لم يجب
                document.getElementById(`lbl-${sIdx}-${qIdx}-${qItem.ans}`).classList.add('correct-answer');
            }
        });

        // إظهار النتيجة للمستخدم
        const resBox = document.getElementById(`res-${sIdx}`);
        resBox.style.display = 'block';
        const totalQ = sectionData.questions.length;
        const scorePercent = Math.round((correctAnswersCount / totalQ) * 100);

        if (scorePercent >= 60) {
            resBox.style.backgroundColor = '#ecfdf5';
            resBox.style.color = '#065f46';
            resBox.style.border = '2px solid #10b981';
            resBox.innerHTML = `🎉 ممتاز! نتيجتك: <strong>${correctAnswersCount} / ${totalQ}</strong> (${scorePercent}%)`;
        } else {
            resBox.style.backgroundColor = '#fef2f2';
            resBox.style.color = '#991b1b';
            resBox.style.border = '2px solid #ef4444';
            resBox.innerHTML = `⚠️ نتيجتك: <strong>${correctAnswersCount} / ${totalQ}</strong> (${scorePercent}%) - يُرجى مراجعة الإجابات المحددة باللون الأخضر.`;
        }

        if (missedQuestions) {
            resBox.innerHTML += `<br><span style="font-size:0.85rem; color:#64748b; font-weight:normal;">(ملاحظة: تُركت بعض الأسئلة بدون إجابة)</span>`;
        }

        // التمرير لرؤية النتيجة بوضوح
        resBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // تهيئة الصفحة فور اكتمال التحميل
    window.onload = buildInterface;
</script>

</html>
